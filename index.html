<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SevenRooms | Client Onboarding</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f5f2;
  margin: 0;
  padding: 40px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  margin-bottom: 10px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  border: 1px solid #ddd;
}

.step {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
}

.badge {
  float: right;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 8px;
}

.done { background: #d1fae5; }
.high { background: #fee2e2; }
.medium { background: #fef3c7; }

input {
  padding: 10px;
  width: 60%;
}

button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">Loading...</h1>
<p id="lead"></p>

<input id="clientInput" placeholder="Enter venue name" />
<button onclick="start()">Start</button>

<div class="card" id="steps"></div>

</div>

<script>
const CLIENTS = {

  demo: {
    name: "Demo Venue",
    title: "Welcome to your onboarding journey.",
    lead: "This is a demo client.",
    steps: [
      {title: "Confirm details", body: "Check launch date", tone: "done"},
      {title: "Setup integrations", body: "POS + payments", tone: "high"},
      {title: "Import data", body: "Upload guests", tone: "high"}
    ]
  },

  sandys: {
    name: "Sandys",
    title: "Welcome, Sandys.",
    lead: "Your onboarding journey is ready. Follow the steps below to get set up for launch.",
    steps: [
      {
        title: "Confirm launch details",
        body: "Review launch date and main contact.",
        tone: "done"
      },
      {
        title: "Set up integrations",
        body: "POS, payments, and required systems.",
        tone: "high"
      },
      {
        title: "Upload guest data",
        body: "Provide your database and reservations.",
        tone: "high"
      },
      {
        title: "Training & testing",
        body: "Complete staff training and test bookings.",
        tone: "medium"
      }
    ]
  }

};

function getClient() {
  const params = new URLSearchParams(window.location.search);
  return params.get("client") || "demo";
}

function render(clientKey) {
  const client = CLIENTS[clientKey] || CLIENTS["demo"];

  document.getElementById("title").innerText = client.title;
  document.getElementById("lead").innerText = client.lead;

  const stepsHTML = client.steps.map(step => `
    <div class="step">
      <strong>${step.title}</strong>
      <span class="badge ${step.tone}">${step.tone}</span>
      <p>${step.body}</p>
    </div>
  `).join("");

  document.getElementById("steps").innerHTML = stepsHTML;
}

function slugify(text) {
  return text.toLowerCase().replace(/\s+/g, "-");
}

function start() {
  const value = document.getElementById("clientInput").value;
  const slug = slugify(value);
  window.location.href = "?client=" + slug;
}

render(getClient());
</script>

</body>
</html>
