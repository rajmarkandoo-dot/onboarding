<!doctype html>
<html amp4email>
  <head>
    <meta charset="utf-8" />
    <script async src="https://cdn.ampproject.org/v0.js"></script>
    <script
      async
      custom-element="amp-list"
      src="https://cdn.ampproject.org/v0/amp-list-0.1.js"></script>
    <script
      async
      custom-template="amp-mustache"
      src="https://cdn.ampproject.org/v0/amp-mustache-0.2.js"></script>
    <style amp4email-boilerplate>
      body { visibility: hidden; }
    </style>
    <style amp-custom>
      body {
        margin: 0;
        padding: 0;
        background: #f7f7f5;
        color: #111111;
        font-family: Arial, Helvetica, sans-serif;
      }

      .wrap {
        padding: 24px 12px;
      }

      .card {
        max-width: 640px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #deded9;
        border-radius: 28px;
        padding: 28px 24px;
      }

      .eyebrow {
        display: inline-block;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid #d9d9d4;
        background: #f5f5f1;
        color: #666666;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 8px;
        font-size: 32px;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .meta {
        margin: 0 0 20px;
        color: #666666;
        font-size: 14px;
        line-height: 1.5;
      }

      .progress {
        margin: 0 0 22px;
      }

      .progress strong {
        display: block;
        margin-bottom: 10px;
        font-size: 34px;
        letter-spacing: -0.04em;
      }

      .progress-bar {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: #e6e6e1;
      }

      .progress-fill {
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #111111 0%, #535353 100%);
      }

      .section-row {
        border: 1px solid #e2e2dc;
        border-radius: 16px;
        padding: 14px;
        margin: 0 0 10px;
        background: #ffffff;
      }

      .section-head {
        width: 100%;
      }

      .section-name {
        display: inline-block;
        width: 66%;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.35;
        vertical-align: top;
      }

      .status-pill {
        display: inline-block;
        width: auto;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.03em;
        white-space: nowrap;
        vertical-align: top;
      }

      .status-complete {
        background: #e7f6ec;
        color: #1a7f37;
      }

      .status-progress {
        background: #fff3d6;
        color: #8a5b00;
      }

      .status-not-started {
        background: #efefeb;
        color: #666666;
      }

      .section-note {
        margin-top: 8px;
        color: #666666;
        font-size: 13px;
        line-height: 1.45;
      }

      .actions {
        margin-top: 22px;
      }

      .button {
        display: inline-block;
        margin-right: 8px;
        margin-bottom: 8px;
        padding: 12px 16px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
      }

      .button-primary {
        background: #3f81b6;
        color: #ffffff;
      }

      .button-secondary {
        background: #ffffff;
        color: #3f81b6;
        border: 1px solid #3f81b6;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <amp-list
          width="auto"
          height="900"
          layout="fixed-height"
          src="https://onboarding-96i5.onrender.com/email-data/build-launch?itemId=YOUR_ITEM_ID&token=YOUR_SIGNED_TOKEN">
          <template type="amp-mustache">
            <div class="eyebrow">Build &amp; Launch</div>
            <h1>{{venueName}}</h1>
            <div class="meta">{{clientName}} · {{onboarder}} · Launch {{launchDate}}</div>

            <div class="progress">
              <strong>{{progressPercent}}%</strong>
              <div class="progress-bar">
                <div class="progress-fill" style="width: {{progressPercent}}%;"></div>
              </div>
            </div>

            {{#sections}}
            <div class="section-row">
              <div class="section-head">
                <span class="section-name">{{name}}</span>
                {{#isComplete}}<span class="status-pill status-complete">Complete</span>{{/isComplete}}
                {{#isInProgress}}<span class="status-pill status-progress">In progress</span>{{/isInProgress}}
                {{#isNotStarted}}<span class="status-pill status-not-started">Not started</span>{{/isNotStarted}}
              </div>
              <div class="section-note">{{note}}</div>
            </div>
            {{/sections}}

            <div class="actions">
              <a class="button button-primary" href="{{links.dashboard}}">Open Dashboard</a>
              <a class="button button-secondary" href="{{links.internal}}">Open Record</a>
              {{#links.client}}<a class="button button-secondary" href="{{links.client}}">Open Client View</a>{{/links.client}}
            </div>
          </template>
        </amp-list>
      </div>
    </div>
  </body>
</html>
